## @section LDAP-Manager Image parameters
##

## Bitnami LDAP-Manager image
## ref: https://hub.docker.com/r/bitnami/wordpress/tags/
## @param image.registry [default: REGISTRY_NAME] LDAP-Manager image registry
## @param image.repository [default: REPOSITORY_NAME/wordpress] LDAP-Manager image repository
## @skip image.tag LDAP-Manager image tag (immutable tags are recommended)
## @param image.digest LDAP-Manager image digest in the way sha256:aa.... Please note this parameter, if set, will override the tag
## @param image.pullPolicy LDAP-Manager image pull policy
## @param image.pullSecrets LDAP-Manager image pull secrets
## @param image.debug Specify if debug values should be set
##
image:
  registry: docker.io
  repository: vibhuvioio/ldap-manager
  tag: 1.0.0
  digest: ""
  ## Specify a imagePullPolicy
  ## ref: https://kubernetes.io/docs/concepts/containers/images/#pre-pulled-images
  ##
  pullPolicy: IfNotPresent
  ## Optionally specify an array of imagePullSecrets.
  ## Secrets must be manually created in the namespace.
  ## ref: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
  ## e.g:
  ## pullSecrets:
  ##   - myRegistryKeySecretName
  ##
  pullSecrets: []
  ## Enable debug mode
  ##
  debug:
    logLevel: INFO
    jsonLogs: true
## @section LDAP-Manager Configuration parameters
## LDAP-Manager settings
## ref: https://hub.docker.com/r/vibhuvioio/ldap-manager
##
