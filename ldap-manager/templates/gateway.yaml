{{- if .Values.gateway.enabled }}
{{- $fullName := include "common.names.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name | default $fullName }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if or .Values.gateway.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" ( dict "values" ( list .Values.gateway.annotations .Values.commonAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.gateway.gatewayClassName }}
  gatewayClassName: {{ .Values.gateway.gatewayClassName | quote }}
  {{- end }}
  listeners:
  {{- range .Values.gateway.listeners }}
    - name: {{ .name }}
      protocol: {{ .protocol }}
      port: {{ .port }}
      {{- if .hostname }}
      hostname: {{ .hostname | quote }}
      {{- end }}
      {{- if .tls }}
      tls:
        mode: {{ .tls.mode | default "Terminate" }}
        {{- if .tls.certificateRefs }}
        certificateRefs:
          {{- range .tls.certificateRefs }}
          - kind: Secret
            name: {{ .name | default (print $fullName "-tls") | quote }}
            {{- if .namespace }}
            namespace: {{ .namespace }}
            {{- end }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- if .allowedRoutes }}
      allowedRoutes:
        {{- toYaml .allowedRoutes | nindent 8 }}
      {{- end }}
  {{- end }}
---
{{- if .Values.httproute.enabled }}
{{- $fullName := include "common.names.fullname" . }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.httproute.name | default $fullName }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if or .Values.httproute.annotations .Values.commonAnnotations }}
  {{- $annotations := include "common.tplvalues.merge" ( dict "values" ( list .Values.httproute.annotations .Values.commonAnnotations ) "context" . ) }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" $annotations "context" $) | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    - name: {{ .Values.httproute.name | default $fullName }}
      {{- if .Values.httproute.namespace }}
      namespace: {{ .Values.httproute.namespace }}
      {{- end }}
  {{- if .Values.httproute.hostnames }}
  hostnames:
  {{- range .Values.httproute.hostnames }}
    - {{ . | quote }}
  {{- end }}
  {{- end }}
  rules:
  {{- range .Values.httproute.routes }}
    - matches:
      {{- if .matches }}
      {{- range .matches }}
      - path:
          type: {{ .path.type | default "PathPrefix" }}
          value: {{ .path.value | quote }}
        {{- if .headers }}
        headers:
          {{- range .headers }}
          - name: {{ .name }}
            value: {{ .value }}
          {{- end }}
        {{- end }}
        {{- if .queryParams }}
        queryParams:
          {{- range .queryParams }}
          - name: {{ .name }}
            value: {{ .value }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- else }}
      - path:
          type: PathPrefix
          value: /
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        {{- range .backendRefs }}
        - name: {{ .name | default $fullName }}
          port: {{ .port }}
          {{- if .weight }}
          weight: {{ .weight }}
          {{- end }}
        {{- end }}
      {{- end }}

{{- end }}
{{- end }}
