apiVersion: {{ include "common.capabilities.statefulset.apiVersion" . }}
kind: StatefulSet
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ .Release.Namespace | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  serviceName: {{ template "common.names.fullname" . }}-headless
  replicas: {{ .Values.replicaCount }}
  updateStrategy:
    type: {{ .Values.updateStrategy.type }}
    {{- if (eq "Recreate" .Values.updateStrategy.type) }}
    rollingUpdate: null
    {{- end }}
  selector:
    matchLabels:
    {{- include "common.labels.matchLabels" . | nindent 6 }}
  template:
    metadata:
      name: {{ template "openldap.name" . }}
      labels:
      {{- include "common.labels.standard" . | nindent 8 }}
      {{- if .Values.commonLabels }}
      {{- include "common.tplvalues.render" ( dict "value" .Values.commonLabels "context" $ ) | nindent 8 }}
      {{- end }}
      {{- if .Values.podLabels }}
      {{- include "common.tplvalues.render" ( dict "value" .Values.podLabels "context" $ ) | nindent 8 }}
      {{- end }}
      {{- with .Values.podAnnotations }}
      annotations: {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- if .Values.schedulerName }}
      schedulerName: "{{ .Values.schedulerName }}"
      {{- end }}
{{- include "openldap.imagePullSecrets" . | indent 6 }}
      {{- if .Values.affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" .Values.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAffinityPreset "context" $) | nindent 10 }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAntiAffinityPreset "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.nodeAffinityPreset.type "key" .Values.nodeAffinityPreset.key "values" .Values.nodeAffinityPreset.values) | nindent 10 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" (dict "value" .Values.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.tolerations "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      {{- end }}
      {{- if .Values.securityContext.enabled }}
      securityContext: {{- omit .Values.securityContext "enabled" | toYaml | nindent 8 }}
      {{- end }}
      automountServiceAccountToken: {{ .Values.serviceAccount.autoMount }}
      {{- if .Values.serviceAccount.enabled }}
      serviceAccountName: {{ default (include "openldap.name" . ) .Values.serviceAccount.name }}
      {{- end }}
      {{- if .Values.extraInitContainers }}
      initContainers:
      {{- if .Values.extraInitContainers }}
      {{- include "common.tplvalues.render" ( dict "value" .Values.extraInitContainers "context" $ ) | nindent 8 }}
      {{- end }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      containers:
        - name: {{ template "openldap.name" . }}
          image: {{ template "openldap.image" . }}
          imagePullPolicy: "{{ .Values.image.pullPolicy }}"
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.lifecycleHooks }}
          lifecycle: {{- include "common.tplvalues.render" (dict "value" .Values.lifecycleHooks "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- omit .Values.containerSecurityContext "enabled" | toYaml | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.command "context" $) | nindent 12 }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.args "context" $) | nindent 12 }}
          {{- end }}
          env:
            - name: BITNAMI_DEBUG
              value: {{ ternary "true" "false" (or .Values.image.debug .Values.diagnosticMode.enabled) | quote }}
            {{- if (not (empty .Values.existingSecret)) }}
            - name: OPENLDAP_BOOTSTRAP_CONFIG_ROOT_PASSWORD_HASHED
              valueFrom:
                secretKeyRef:
                  name: {{ template "openldap.secretName" . }}
                  key: openldap-ldap-config-password
            {{- end }}
            {{- if (not (empty .Values.existingSecret)) }}
            - name: OPENLDAP_BOOTSTRAP_DATA_ROOT_PASSWORD_HASHED
              valueFrom:
                secretKeyRef:
                  name: {{ template "openldap.secretName" . }}
                  key: openldap-ldap-root-password
            {{- end }}
            {{- if (not (empty .Values.existingSecret)) }}
            - name: OPENLDAP_BOOTSTRAP_DATA_READONLY_PASSWORD_HASHED
              valueFrom:
                secretKeyRef:
                  name: {{ template "openldap.secretName" . }}
                  key: openldap-ldap-readonly-password
            {{- end }}
            {{- if (not (empty .Values.existingSecret)) }}
            - name: OPENLDAP_BOOTSTRAP_MONITOR_READONLY_PASSWORD_HASHED
              valueFrom:
                secretKeyRef:
                  name: {{ template "openldap.secretName" . }}
                  key: openldap-ldap-monitor-password
            {{- end }}

          envFrom:
            - configMapRef:
                name: {{ template "openldap.name" . }}-env
            - secretRef:
                name: {{ template "openldap.secretName" . }}
          {{- if (not (empty .Values.extraEnvVarsCM)) }}
            - configMapRef:
                name: {{ tpl .Values.extraEnvVarsCM . }}
          {{- end }}
          {{- if (not (empty .Values.extraEnvVarsSecret)) }}
            - secretRef:
                name: {{ tpl .Values.extraEnvVarsSecret . }}
          {{- end }}
          ports:
            - name: ldap
              containerPort: {{ .Values.containerPorts.ldap }}
            - name: ssl-ldap
              containerPort: {{ .Values.containerPorts.sslLdap }}
          {{- if not .Values.diagnosticMode.enabled }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: {{ .Values.startupProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.startupProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.startupProbe.timeoutSeconds }}
            successThreshold: {{ .Values.startupProbe.successThreshold }}
            failureThreshold: {{ .Values.startupProbe.failureThreshold }}
          {{- else if .Values.customStartupProbe }}
          startupProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customStartupProbe "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.livenessProbe.enabled }}
          livenessProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.livenessProbe.failureThreshold }}
          {{- else if .Values.customLivenessProbe }}
          livenessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customLivenessProbe "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.readinessProbe.enabled }}
          readinessProbe:
            tcpSocket:
              port: ldap
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds }}
            successThreshold: {{ .Values.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.readinessProbe.failureThreshold }}
          {{- else if .Values.customReadinessProbe }}
          readinessProbe: {{- include "common.tplvalues.render" (dict "value" .Values.customReadinessProbe "context" $) | nindent 12 }}
          {{- end }}
          {{- end }}
          volumeMounts:
            {{- range .Values.customFileSets }}
            {{- $fs := . }}
            {{- range .files }}
            - name: {{ $fs.name }}
              mountPath: {{ $.Values.env.OPENLDAP_CUSTOM_SCHEMAS_DIR }}/{{ .filename }}
              subPath: {{ .filename }}
            {{- end }}
            {{- end }}
            {{- range .Values.predefinedFileSets }}
            {{- if (get $.Values.enableOptional .name) }}
            {{- range .fileSets }}
            {{- $fs := . }}
            {{- range .files }}
            - name: {{ $fs.name }}
              mountPath: {{ $.Values.env.OPENLDAP_CUSTOM_SCHEMAS_DIR }}/{{ .filename }}
              subPath: {{ .filename }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- end }}
            {{- if .Values.persistence.enabled }}
            - name: data
              mountPath: {{ .Values.persistence.mountPath }}
              subPath: {{ .Values.persistence.subPath }}
            {{- end }}
            {{- if .Values.persistenceBackups.enabled }}
            - name: backups
              mountPath: {{ .Values.persistenceBackups.mountPath }}
              subPath: {{ .Values.persistenceBackups.subPath }}
            {{- end }}
            {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
            {{- end }}
{{- if .Values.sidecars }}
{{- include "common.tplvalues.render" ( dict "value" .Values.sidecars "context" $ ) | nindent 8 }}
{{- end }}
      volumes:
        {{- if  or (.Files.Glob "files/docker-entrypoint-initdb.d/*.{sh}") .Values.initdbScriptsConfigMap .Values.initdbScripts }}
        - name: custom-init-scripts
          configMap:
            name: {{ template "openldap.initdbScriptsCM" . }}
            defaultMode: 0777
        {{- end }}
        {{- if .Values.initdbScriptsSecret }}
        - name: custom-init-scripts-secret
          secret:
            secretName: {{ template "openldap.initdbScriptsSecret" . }}
        {{- end }}
        {{- range .Values.customFileSets }}
        - name: {{ .name }}
          configMap:
            name: {{ template "common.names.fullname" $ }}-fs-{{ .name }}
        {{- end }}
        {{- range .Values.predefinedFileSets }}
        {{- if (get $.Values.enableOptional .name) }}
        {{- range .fileSets }}
        - name: {{ .name }}
          configMap:
            name: {{ template "common.names.fullname" $ }}-fs-{{ .name }}
        {{- end }}
        {{- end }}
        {{- end }}
        {{- if .Values.extraVolumes }}
        {{- include "common.tplvalues.render" ( dict "value" .Values.extraVolumes "context" $ ) | nindent 8 }}
        {{- end }}
      {{- if .Values.extraPodSpec }}
      {{- include "common.tplvalues.render" (dict "value" .Values.extraPodSpec "context" $) | nindent 6 }}
      {{- end }}
{{- if and .Values.persistence.enabled .Values.persistence.existingClaim }}
        - name: data
          persistentVolumeClaim:
{{- with .Values.persistence.existingClaim }}
            claimName: {{ tpl . $ }}
{{- end }}
{{- else if not .Values.persistence.enabled }}
        - name: data
          emptyDir: {}
{{- end }}
{{- if and .Values.persistenceBackups.enabled .Values.persistenceBackups.existingClaim }}
        - name: data
          persistentVolumeClaim:
{{- with .Values.persistenceBackups.existingClaim }}
            claimName: {{ tpl . $ }}
{{- end }}
{{- else if not .Values.persistenceBackups.enabled }}
        - name: backups
          emptyDir: {}
{{- end }}
  volumeClaimTemplates:
{{- if and .Values.persistence.enabled (not .Values.persistence.existingClaim) }}
    - metadata:
        name: data
      {{- with .Values.persistence.annotations }}
        annotations:
        {{- range $key, $value := . }}
          {{ $key }}: {{ $value }}
        {{- end }}
      {{- end }}
      spec:
        accessModes:
        {{- range .Values.persistence.accessModes }}
          - {{ . | quote }}
        {{- end }}
        {{- if .Values.persistence.snapshotName }}
        dataSource:
          name: {{ .Values.persistence.snapshotName }}
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistence.size | quote }}
        {{ include "common.storage.class" (dict "persistence" .Values.persistence "global" .Values.global) }}
        {{- if .Values.persistence.selector }}
        selector: {{- include "common.tplvalues.render" (dict "value" .Values.persistence.selector "context" $) | nindent 10 }}
        {{- end -}}
{{- end }}
{{- if and .Values.persistenceBackups.enabled (not .Values.persistenceBackups.existingClaim) }}
    - metadata:
        name: backups
      {{- with .Values.persistenceBackups.annotations }}
        annotations:
        {{- range $key, $value := . }}
          {{ $key }}: {{ $value }}
        {{- end }}
      {{- end }}
      spec:
        accessModes:
        {{- range .Values.persistenceBackups.accessModes }}
          - {{ . | quote }}
        {{- end }}
        {{- if .Values.persistenceBackups.snapshotName }}
        dataSource:
          name: {{ .Values.persistenceBackups.snapshotName }}
          kind: VolumeSnapshot
          apiGroup: snapshot.storage.k8s.io
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.persistenceBackups.size | quote }}
        {{ include "common.storage.class" (dict "persistence" .Values.persistenceBackups "global" .Values.global) }}
        {{- if .Values.persistenceBackups.selector }}
        selector: {{- include "common.tplvalues.render" (dict "value" .Values.persistenceBackups.selector "context" $) | nindent 10 }}
        {{- end -}}
{{- end }}
