# templates/networkpolicy.yaml
{{- if and .Values.networkPolicy.enabled }}
{{- range .Values.networkPolicy.policies }}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ .name }}
  namespace: {{ include "myapp.namespaceName" $ }}
  labels:
    {{- include "myapp.labels" $ | nindent 4 }}
spec:
  podSelector:
    {{- toYaml .podSelector | nindent 4 }}
  policyTypes:
  {{- range .policyTypes }}
  - {{ . }}
  {{- end }}
  {{- with .ingress }}
  ingress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .egress }}
  egress:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
{{- end }}
