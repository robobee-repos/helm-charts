# templates/namespace-setup-job.yaml
{{- if .Values.setupJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "common.names.fullname" . }}-namespace-setup
  namespace: {{ include "myapp.namespaceName" . }}
  labels:
    {{- include "myapp.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    metadata:
      name: namespace-setup
    spec:
      restartPolicy: Never
      serviceAccountName: {{ include "common.names.fullname" . }}-deployer
      containers:
      - name: setup
        image: {{ .Values.setupJob.image }}
        command:
        {{- toYaml .Values.setupJob.command | nindent 10 }}
        env:
        - name: NAMESPACE
          value: {{ include "myapp.namespaceName" . }}
        {{- with .Values.setupJob.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
{{- end }}
